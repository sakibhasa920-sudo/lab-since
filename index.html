<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ল্যাব সায়েন্স ডায়াগনস্টিক</title> 
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet"> 
    <style> 
        *{ box-sizing:border-box; margin:0; padding:0; } 
        body{ font-family:'Noto Sans Bengali', sans-serif; background:#f1f5f9; color:#1e293b; display: flex; flex-direction: column; min-height: 100vh; } 

        /* Banner */ 
        .top-banner{ background:linear-gradient(90deg,#0f4c81,#2563eb); color:white; padding:12px 0; overflow:hidden; white-space:nowrap; font-weight:600; font-size: 14px; } 
        .top-banner div{ display:inline-block; padding-left:100%; animation:scroll 15s linear infinite; } 
        @keyframes scroll{ 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} } 

        /* Header */ 
        header{ background:white; padding:20px 10px; text-align:center; border-bottom-left-radius:25px; border-bottom-right-radius:25px; box-shadow:0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; } 
        header img{ height:60px; margin-bottom:8px; } 
        header h1{ color:#0f4c81; font-size:22px; font-weight:700; } 

        /* Container */ 
        .container{ width: 100%; max-width: 400px; margin: 0 auto; padding: 10px 15px; flex-grow: 1; } 

        /* Card */ 
        .card{ background:white; border-radius:20px; padding:25px 20px; margin-bottom:15px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.02); } 

        /* Profile */ 
        .profile-img-container { position: relative; width: 120px; height: 120px; margin: 0 auto 15px; border-radius: 50%; padding: 4px; background: linear-gradient(135deg, #e0f2fe, #38bdf8); }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: white; border: 2px solid white; }

        /* Text Styles */ 
        .card h2{ margin:5px 0; font-size:24px; color: #1e293b; font-weight: 700; } 
        .designation { color: #475569; font-size: 15px; font-weight: 600; margin-bottom: 4px; }
        .address { color: #64748b; font-size: 13px; margin-bottom: 5px; }

        /* Buttons */ 
        .btn{ display:flex; align-items: center; justify-content: center; text-decoration:none; padding:16px; border-radius:12px; font-weight:700; margin-top:20px; transition:0.3s; font-size: 16px; gap: 8px; } 
        .call{ background:#14b8a6; color:white; box-shadow: 0 8px 20px rgba(20, 184, 166, 0.3); } 
        
        .complaint-section h2 { font-size: 20px; margin-bottom: 8px; }
        .complaint-section p { font-size: 13px; color: #64748b; margin-bottom: 5px; }
        .complaint{ background:#0f4c81; color:white; box-shadow: 0 8px 20px rgba(15, 76, 129, 0.3); margin-top: 15px; } 
        
        /* Mobile Scaling Fix */
        @media (max-width: 360px) {
            header h1 { font-size: 18px; }
            .card h2 { font-size: 20px; }
        }
    </style> 
</head> 
<body> 
    <div class="top-banner"> 
        <div>আপনাদের সেবায় নিয়োজিত — ল্যাব সায়েন্স ডায়াগনস্টিক — আপনাদের সুস্থতাই আমাদের কাম্য</div> 
    </div> 

    <header> 
        <img src="logo.png" alt="Logo"> 
        <h1>ল্যাব সায়েন্স ডায়াগনস্টিক</h1> 
    </header> 

    <div class="container"> 
        <div class="card"> 
            <div class="profile-img-container">
                <img src="zia_vai_passport.jpg" class="profile-img" alt="Profile"> 
            </div>
            <h2>জিয়া চৌধুরী</h2> 
            <p class="designation">ম্যানেজার, টেকনিক্যাল</p> 
            <p class="address">১৫৩/১ গ্রিন রোড, ঢাকা</p> 
            <a href="tel:+8801972660011" class="btn call"> 
               <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
               কল করুন 
            </a> 
        </div> 

        <div class="card complaint-section"> 
            <h2>অভিযোগ বা মতামত</h2> 
            <p>আমাদের সেবার মান উন্নত করতে আপনার মতামত দিন</p> 
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSekhTk-hSKsf3Q7uZ8S2ofNNMavX3VsM58T8qjcx7UXpxuiBQ/viewform" target="_blank" class="btn complaint"> 
                অভিযোগ জমা দিন 
            </a> 
        </div> 
    </div> 
</body> 
</html>
