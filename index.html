<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ল্যাব সায়েন্স ডায়াগনস্টিক</title> 
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet"> 
    <style> 
        *{ box-sizing:border-box; margin:0; padding:0; } 
        body{ font-family:'Noto Sans Bengali', sans-serif; background:#f1f5f9; color:#1e293b; min-height: 100vh; } 

        /* Banner */ 
        .top-banner{ background:linear-gradient(90deg,#0f4c81,#2563eb); color:white; padding:10px; overflow:hidden; white-space:nowrap; font-weight:600; position: sticky; top: 0; z-index: 1000; } 
        .top-banner div{ display:inline-block; padding-left:100%; animation:scroll 15s linear infinite; } 
        @keyframes scroll{ 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} } 

        /* Header */ 
        header{ background:white; padding:20px 25px; text-align:center; border-bottom-left-radius:30px; border-bottom-right-radius:30px; box-shadow:0 8px 20px rgba(0,0,0,0.08); margin-bottom: 20px; } 
        header img{ height:60px; margin-bottom:8px; } 
        header h1{ color:#0f4c81; font-size:24px; font-weight:700; } 

        /* Container - সাইজ আপডেট করা হয়েছে */ 
        .container{ width: 95%; max-width: 500px; margin: auto; padding: 10px; padding-bottom: 80px; } 

        /* Card */ 
        .card{ background:white; border-radius:25px; padding:30px 20px; margin-bottom:20px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); } 

        /* Profile */ 
        .profile-img-container { position: relative; width: 140px; height: 140px; margin: 0 auto 15px; }
        .profile-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid #e0f2fe; padding: 5px; background: linear-gradient(135deg, #e0f2fe, #bae6fd); }

        /* Text */ 
        .card h2{ margin:8px 0; font-size:26px; color: #1e293b; } 
        .card .designation { color: #475569; font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .card .address { color: #94a3b8; font-size: 15px; line-height: 1.4; }

        /* Buttons */ 
        .btn{ display:block; text-decoration:none; padding:16px; border-radius:15px; font-weight:700; margin-top:20px; transition:0.3s; font-size: 18px; } 
        .call{ background:#14b8a6; color:white; box-shadow: 0 4px 15px rgba(20, 184, 166, 0.3); } 
        .complaint-section h2 { font-size: 22px; color: #1e293b; margin-bottom: 8px; }
        .complaint-section p { font-size: 14px; color: #64748b; }
        .complaint{ background:#0f4c81; color:white; box-shadow: 0 4px 15px rgba(15, 76, 129, 0.3); } 
        
        .btn:active { transform: scale(0.98); }
    </style> 
</head> 
<body> 
    <div class="top-banner"> 
        <div>আপনাদের সেবায় নিয়োজিত — ল্যাব সায়েন্স ডায়াগনস্টিক — আপনাদের সুস্থতাই আমাদের কাম্য</div> 
    </div> 

    <header> 
        <img src="logo.png" alt="Logo"> 
        <h1>ল্যাব সায়েন্স ডায়াগনস্টিক</h1> 
    </header> 

    <div class="container"> 
        <div class="card"> 
            <div class="profile-img-container">
                <img src="zia_vai_passport.jpg" class="profile-img" alt="Profile"> 
            </div>
            <h2>জিয়া চৌধুরী</h2> 
            <p class="designation">ম্যানেজার, টেকনিক্যাল</p> 
            <p class="address">১৫৩/১ গ্রিন রোড, ঢাকা</p> 
            <a href="tel:+8801972660011" class="btn call"> 📞 কল করুন </a> 
        </div> 

        <div class="card complaint-section"> 
            <h2>অভিযোগ বা মতামত</h2> 
            <p>আমাদের সেবার মান উন্নত করতে আপনার মতামত দিন</p> 
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSekhTk-hSKsf3Q7uZ8S2ofNNMavX3VsM58T8qjcx7UXpxuiBQ/viewform" target="_blank" class="btn complaint"> 
                অভিযোগ জমা দিন 
            </a> 
        </div> 
    </div>

    <script type="text/javascript">
    var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
    (function(){
    var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
    s1.async=true;
    s1.src='https://embed.tawk.to/69ad5585c6ed421c36a3fd62/1jj6hc508';
    s1.charset='UTF-8';
    s1.setAttribute('crossorigin','*');
    s0.parentNode.insertBefore(s1,s0);
    })();
    </script>
</body> 
</html>
