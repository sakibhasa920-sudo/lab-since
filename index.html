<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ল্যাব সায়েন্স ডায়াগনস্টিক</title> 
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet"> 
    <style> 
        *{ box-sizing:border-box; margin:0; padding:0; } 
        
        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body{ 
            font-family:'Noto Sans Bengali', sans-serif; 
            background:#f1f5f9; 
            color:#1e293b; 
            display: flex;
            flex-direction: column;
        } 

        /* Banner */ 
        .top-banner{ 
            background:linear-gradient(90deg,#0f4c81,#2563eb); 
            color:white; 
            padding:12px 0; 
            overflow:hidden; 
            white-space:nowrap; 
            font-weight:600; 
            width: 100%;
        } 
        .top-banner div{ display:inline-block; padding-left:100%; animation:scroll 15s linear infinite; } 
        @keyframes scroll{ 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} } 

        /* Header */ 
        header{ 
            background:white; 
            padding:25px 15px; 
            text-align:center; 
            border-bottom-left-radius:30px; 
            border-bottom-right-radius:30px; 
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
            width: 100%;
        } 
        header img{ height:65px; margin-bottom:10px; } 
        header h1{ color:#0f4c81; font-size:24px; font-weight:700; } 

        /* Full Display Container */ 
        .container{ 
            flex: 1;
            width: 100%;
            max-width: 500px; 
            margin: 0 auto; 
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        } 

        /* Card */ 
        .card{ 
            background:white; 
            border-radius:25px; 
            padding:30px 20px; 
            margin-bottom:20px; 
            text-align:center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
        } 

        /* Profile */ 
        .profile-img-container { 
            position: relative; 
            width: 140px; 
            height: 140px; 
            margin: 0 auto 15px; 
        } 
        .profile-img { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 5px solid #e0f2fe; 
            background: white;
        } 

        /* Text */ 
        .card h2{ margin:8px 0; font-size:26px; color: #1e293b; } 
        .card .designation { color: #475569; font-size: 17px; font-weight: 600; margin-bottom: 5px; } 
        .card .address { color: #94a3b8; font-size: 15px; } 

        /* Buttons */ 
        .btn{ 
            display: block; 
            text-decoration:none; 
            padding:18px; 
            border-radius:15px; 
            font-weight:700; 
            margin-top:25px; 
            font-size: 18px;
            transition: 0.3s;
        } 
        .call{ background:#14b8a6; color:white; box-shadow: 0 5px 15px rgba(20, 184, 166, 0.4); } 
        
        .complaint-section h2 { font-size: 22px; color: #1e293b; margin-bottom: 8px; } 
        .complaint-section p { font-size: 14px; color: #64748b; } 
        .complaint{ background:#0f4c81; color:white; box-shadow: 0 5px 15px rgba(15, 76, 129, 0.4); } 

    </style> 
</head> 
<body> 
    <div class="top-banner"> 
        <div>আপনাদের সেবায় নিয়োজিত — ল্যাব সায়েন্স ডায়াগনস্টিক — আপনাদের সুস্থতাই আমাদের কাম্য</div> 
    </div> 

    <header> 
        <img src="logo.png" alt="Logo"> 
        <h1>ল্যাব সায়েন্স ডায়াগনস্টিক</h1> 
    </header> 

    <div class="container"> 
        <div class="card"> 
            <div class="profile-img-container"> 
                <img src="zia_vai_passport.jpg" class="profile-img" alt="Profile"> 
            </div> 
            <h2>জিয়া চৌধুরী</h2> 
            <p class="designation">ম্যানেজার, টেকনিক্যাল</p> 
            <p class="address">১৫৩/১ গ্রিন রোড, ঢাকা</p> 
            <a href="tel:+8801972660011" class="btn call">📞 কল করুন</a> 
        </div> 

        <div class="card complaint-section"> 
            <h2>অভিযোগ বা মতামত</h2> 
            <p>আমাদের সেবার মান উন্নত করতে আপনার মতামত দিন</p> 
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSekhTk-hSKsf3Q7uZ8S2ofNNMavX3VsM58T8qjcx7UXpxuiBQ/viewform" target="_blank" class="btn complaint"> 
                অভিযোগ জমা দিন 
            </a> 
        </div> 
    </div> 
</body> 
</html>
